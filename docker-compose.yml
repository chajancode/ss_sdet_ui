services:
  selenoid:
    image: aerokube/selenoid:latest-release
    ports:
      - "4444:4444"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./selenoid/config/:/etc/selenoid/config/
    command: ["-conf", "/etc/selenoid/config/browsers.json"]

  tests:
    build: .
    depends_on:
      - selenoid
    environment:
      - SELENOID_HOST=http://selenoid:4444
      - PYTHONUNBUFFERED=1
    volumes:
      - ./allure-results:/app/allure-results
    command: ["/bin/bash", "/app/bash_scripts/selenoid_run.sh"]
