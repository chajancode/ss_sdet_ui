services:
  selenoid:
    build:
      context: ./selenoid
      dockerfile: Dockerfile.selenoid

    ports:
      - "4444:4444"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: [
        "-conf", "/etc/selenoid/config/browsers.json",
        "-timeout", "60s",
        "-args", "--network", "ss_sdet_ui_default"
    ]
    networks:
      - default

  tests:
    build: .
    depends_on:
      - selenoid
    environment:
      - SELENOID_HOST=http://selenoid:4444/wd/hub
      - SELENOID_URL=http://selenoid:4444/wd/hub
      - PYTHONUNBUFFERED=1
    volumes:
      - ./allure-results:/app/allure-results
    command: ["/bin/bash", "/app/bash_scripts/selenoid_run.sh"]

networks:
  default:
    name: ss_sdet_ui_default
    driver: bridge
